version: '3.8'
services:
  mysql:
    image: mysql:8.0
    container_name: student-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: student_system
    ports:
      - "3306:3306"
    volumes:
      - ./src/main/resources/db/schema.sql:/docker-entrypoint-initdb.d/1-schema.sql
      - ./src/main/resources/db/init_data.sql:/docker-entrypoint-initdb.d/2-init.sql
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 10s
      retries: 10

  app:
    build: .
    container_name: student-app
    ports:
      - "8080:8080"
    environment:
      DB_URL: jdbc:mysql://mysql:3306/student_system?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai
      DB_USER: root
      DB_PASS: root
    depends_on:
      mysql:
        condition: service_healthy

volumes:
  mysql_data:
